    "einops==0.8.0",
    "fastparquet==2024.2.0",
    "h5py==3.10.0",
    "hydra-core==1.3.2",
    "icd10-cm>=0.0.5",
    "ipykernel==6.29.5",
    "joblib==1.4.2",
    "jupyter==1.1.1",
    "jupyterlab>=4.3.8",
    "leidenalg>=0.11.0",
    "lifelines>=0.28.0",
    "matplotlib==3.9.0",
    "notebook==7.3.1",
    "numpy==1.24.4",
    "omegaconf==2.3.0",
    "openai>=1.105.0",
    "optuna==3.6.0",
    "pandas==1.5.3",
    "plotly==5.24.1",
    "psutil==6.1.0",
    "pyarrow==14.0.2",
    "pycox>=0.3.0",
    "pydantic-settings>=2.10.1",
