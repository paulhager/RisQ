    "safetensors==0.4.3",
    "scfates>=1.1.1",
    "schedulefree==1.2.7",
    "scikit-learn==1.5.1",
    "scikit-survival>=0.23.1",
    "scipy==1.12.0",
    "seaborn==0.13.2",
    "sentence-transformers==3.3.1",
    "skrub==0.4.1",
    "tabicl>=0.1.3",
    "tabpfn==2.0.0",
    "tensorstore>=0.1.45",
    "torch==2.2.2",
    "torch-geometric==2.6.1",
    "torch-scatter>=2.1.2",
    "torchmetrics==1.4.0.post0",
